name: Update LastFM

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: npm install

      - run: node fetch.js
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add latest.json
          git commit -m "update latest track" || echo "No changes"
          git push
                
      - name: Deploy to Neocities
        run: |
          curl -v -u "velosophy:d8249da93b6ac5e2dbfc15d486746154" \
          -F "latest.json=@latest.json" \
          https://neocities.org/api/upload
