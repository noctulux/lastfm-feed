name: Update LastFM

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: npm install

      - run: node fetch.js
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          
      - name: Deploy to Neocities
        run: |
          curl -v -u "velosophy:${{ secrets.NEOCITIES_API_KEY }}" \
          -F "latest.json=@latest.json" \
          https://neocities.org/api/upload
