name: Update LastFM

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  
permissions:
    contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: npm install

      - run: node fetch.js
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          
      - name: Commit updated JSON
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add latest.json
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "update latest track"
          git push
                
      - name: Deploy to Neocities 
        run: |
          curl -u "velosophy:${{ secrets.NEOCITIES_API_KEY }}" \
          -F "latest.json=@latest.json" \
          https://neocities.org/api/upload
